<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
</head>
<body>

    <h1>Student Information</h1>

    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Roll Number:</b> <span id="roll"></span></p>
    <p><b>Register Number:</b> <span id="reg"></span></p>

    <script>
        fetch('http://backend:5000/student-details')
        .then(res => res.json())
        .then(data => {
            document.getElementById('name').innerText = data.name;
            document.getElementById('roll').innerText = data.roll_number;
            document.getElementById('reg').innerText = data.register_number;
        })
        .catch(err => console.log(err));
    </script>

</body>
</html>
